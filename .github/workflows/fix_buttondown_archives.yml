name: Fix Buttondown Archive Formatting

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview without patching)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fix archive formatting
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python fix_buttondown_archives.py --dry-run
          else
            python fix_buttondown_archives.py
          fi
